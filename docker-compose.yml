# ══════════════════════════════════════════════════════════════
# GraciasMadre — Docker Compose para desarrollo local
# Uso: docker compose up -d
# ══════════════════════════════════════════════════════════════

services:

  # ── Aplicación Laravel ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: graciasmadre_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "GraciasMadre 💐"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: "${APP_KEY}"
      APP_URL: "http://localhost:8080"
      APP_TIMEZONE: America/Mexico_City
      APP_LOCALE: es
      APP_FALLBACK_LOCALE: es
      APP_FAKER_LOCALE: es_MX

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: graciasmadre
      DB_USERNAME: graciasmadre
      DB_PASSWORD: secret

      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    networks:
      - graciasmadre_net

  # ── Base de datos MySQL ──────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: graciasmadre_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: graciasmadre
      MYSQL_USER: graciasmadre
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"          # 3307 para no chocar con XAMPP local
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - graciasmadre_net

volumes:
  mysql_data:
  storage_data:
  logs_data:

networks:
  graciasmadre_net:
    driver: bridge
