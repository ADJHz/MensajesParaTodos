<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4F0"/>
      <stop offset="100%" stop-color="#FFB8D0"/>
    </radialGradient>
    <radialGradient id="petal-g" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFD6E0"/>
      <stop offset="100%" stop-color="#F4A0BF"/>
    </radialGradient>
    <radialGradient id="center-g" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFE4BA"/>
      <stop offset="100%" stop-color="#F4A0BF"/>
    </radialGradient>
  </defs>

  <!-- Fondo circular -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- 5 pétalos de flor -->
  <g transform="translate(32,32)">
    <ellipse rx="6" ry="14" fill="url(#petal-g)" transform="rotate(0) translate(0,-11)"/>
    <ellipse rx="6" ry="14" fill="url(#petal-g)" transform="rotate(72) translate(0,-11)"/>
    <ellipse rx="6" ry="14" fill="url(#petal-g)" transform="rotate(144) translate(0,-11)"/>
    <ellipse rx="6" ry="14" fill="url(#petal-g)" transform="rotate(216) translate(0,-11)"/>
    <ellipse rx="6" ry="14" fill="url(#petal-g)" transform="rotate(288) translate(0,-11)"/>
  </g>

  <!-- Centro de la flor -->
  <circle cx="32" cy="32" r="9" fill="url(#center-g)"/>

  <!-- Corazón interior -->
  <path d="M32 36.5 C32 36.5 26 32 26 28.5 C26 26.5 27.5 25 29.5 25 C30.7 25 31.7 25.6 32 26.2 C32.3 25.6 33.3 25 34.5 25 C36.5 25 38 26.5 38 28.5 C38 32 32 36.5 32 36.5Z"
        fill="#D4467A" opacity="0.9"/>
</svg>
