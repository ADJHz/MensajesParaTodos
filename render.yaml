# ══════════════════════════════════════════════════════════════
# Mensajes para todos — Configuración de despliegue en Render
# Base de datos: TiDB Cloud (MySQL compatible)
# ══════════════════════════════════════════════════════════════

services:

  # ── Aplicación Web (Docker) ────────────────────────────────
  - type: web
    name: mensajes-para-todos
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up

    envVars:
      # ── Aplicación Laravel ─────────────────────────────────
      - key: APP_NAME
        value: "Mensajes para todos"

      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        value: https://mensajesparatodos.onrender.com

      # ASSET_URL asegura que Vite sirva assets sobre HTTPS
      - key: ASSET_URL
        value: https://mensajesparatodos.onrender.com

      - key: APP_TIMEZONE
        value: America/Mexico_City

      - key: APP_LOCALE
        value: es

      - key: APP_FALLBACK_LOCALE
        value: es

      - key: APP_FAKER_LOCALE
        value: es_MX

      # ── Base de datos TiDB Cloud (MySQL compatible) ─────────
      - key: DB_CONNECTION
        value: mysql

      - key: DB_HOST
        sync: false   # Ingresar en el dashboard de Render → Environment

      - key: DB_PORT
        value: "4000"

      - key: DB_DATABASE
        value: mensajes_para_todos

      - key: DB_USERNAME
        sync: false   # Ingresar en el dashboard de Render → Environment

      - key: DB_PASSWORD
        sync: false   # Ingresar en el dashboard de Render → Environment

      # Certificado SSL del sistema Alpine — requerido por TiDB Cloud
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt

      # ── Sesiones y caché ────────────────────────────────────
      - key: FILESYSTEM_DISK
        value: public

      - key: SESSION_DRIVER
        value: database

      - key: SESSION_LIFETIME
        value: "120"

      - key: CACHE_STORE
        value: database

      - key: QUEUE_CONNECTION
        value: sync

      # ── Logs ─────────────────────────────────────────────────
      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: warning

      # ── Mail ─────────────────────────────────────────────────
      - key: MAIL_MAILER
        value: log

      - key: MAIL_FROM_ADDRESS
        value: hola@tu-dominio.com

      - key: MAIL_FROM_NAME
        value: "Mensajes para todos 💐"
